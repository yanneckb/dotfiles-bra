# Minimal Kitty config — Gruvbox Hard theme
# Docs: https://sw.kovidgoyal.net/kitty/conf/

font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12

scrollback_lines 10000
enable_audio_bell no
window_padding_width 4

# Gruvbox Hard
foreground              #ebdbb2
background              #1d2021
selection_foreground    #ebdbb2
selection_background    #665c54
cursor                  #ebdbb2
cursor_text_color       #1d2021

color0  #1d2021
color8  #928374
color1  #cc241d
color9  #fb4934
color2  #98971a
color10 #b8bb26
color3  #d79921
color11 #fabd2f
color4  #458588
color12 #83a598
color5  #b16286
color13 #d3869b
color6  #689d6a
color14 #8ec07c
color7  #a89984
color15 #ebdbb2

# Tabs & splits (macOS)
map cmd+t new_tab
map cmd+w close_tab
map cmd+d launch --location=hsplit
map cmd+shift+d launch --location=vsplit
map cmd+shift+enter new_window
